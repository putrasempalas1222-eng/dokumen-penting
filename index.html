<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer 3D Multi File</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.15), transparent 40%),
        linear-gradient(135deg,#ffffff,#f3f6fb);
}

.scene{
    width:100%;
    max-width:420px;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:2000px;
}

.card{
    width:95%;
    height:auto;
    position:relative;
    border-radius:24px;
    transform-style:preserve-3d;
    cursor:grab;
}

/* FACE */
.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:24px;
    overflow:hidden;
    backface-visibility:hidden;
}

/* FRONT */
.front{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* BACK */
.back{
    transform: rotateY(180deg);
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(25px);
}

/* DEPTH */
.card::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:26px;
    background:linear-gradient(to right,rgba(0,0,0,0.15),transparent,rgba(0,0,0,0.15));
    opacity:.2;
    filter:blur(6px);
}

.card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:24px;
    background:linear-gradient(to bottom,rgba(255,255,255,0.8),transparent,rgba(0,0,0,0.1));
    opacity:.4;
    pointer-events:none;
}

/* CONTAINER */
#pdf-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    width:100%;
    height:100%;
    overflow-y:auto;
    padding:14px;
    scroll-behavior:smooth;
}

/* SCROLLBAR */
#pdf-container::-webkit-scrollbar{
    width:6px;
}
#pdf-container::-webkit-scrollbar-thumb{
    background:linear-gradient(#4facfe,#00f2fe);
    border-radius:10px;
}

/* PDF */
canvas{
    width:100%;
    margin-bottom:14px;
    border-radius:14px;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* IMAGE */
img{
    max-width:100%;
    max-height:80vh;

    width:auto;
    height:auto;

    display:block;
    margin:auto;

    object-fit:contain;

    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* SHADOW */
.shadow{
    position:absolute;
    bottom:-45px;
    width:65%;
    height:35px;
    left:17%;
    background:rgba(0,0,0,0.2);
    filter:blur(30px);
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="face front">
            <div id="pdf-container"></div>
        </div>

        <div class="face back"></div>

        <div class="shadow" id="shadow"></div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

// =========================
// 🔥 AMBIL PARAMETER LINK
// =========================
const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("link");

if(!fileUrl){
    alert("Link tidak ditemukan!");
}

// =========================
// API URL
// =========================
const apiUrl = "/api/pdf?link=" + encodeURIComponent(fileUrl);

const container = document.getElementById("pdf-container");

// =========================
// 🔥 LOAD FILE (AUTO DETECT)
// =========================
async function loadFile(){

    const res = await fetch(apiUrl);
    const blob = await res.blob();
    const type = blob.type;

    console.log("TYPE:", type);

    if(type.includes("pdf")){
        loadPDF(blob);
    }
    else if(type.startsWith("image")){
        showImage(blob);
    }
    else{
        container.innerHTML = "<p>File tidak didukung</p>";
    }
}

// =========================
// 📄 PDF VIEWER
// =========================
async function loadPDF(blob){

    const buffer = await blob.arrayBuffer();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    async function renderPage(num){
        if(num > pdf.numPages) return;

        const page = await pdf.getPage(num);
        const viewport = page.getViewport({ scale:1 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;

        setTimeout(()=>renderPage(num+1),80);
    }

    renderPage(1);
}

// =========================
// 🖼 IMAGE VIEWER
// =========================
function showImage(blob){

    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;

    container.appendChild(img);
}

// =========================
// LOAD
// =========================
loadFile();

// =========================
// SCROLL DETECTOR
// =========================
let isScrolling = false;

container.addEventListener("touchstart", () => {
    isScrolling = true;
}, { passive: true });

container.addEventListener("touchend", () => {
    setTimeout(() => isScrolling = false, 100);
});

container.addEventListener("scroll", () => {
    isScrolling = true;
    clearTimeout(container._scrollTimer);
    container._scrollTimer = setTimeout(() => {
        isScrolling = false;
    }, 120);
});

// =========================
// 🌀 ROTATE 3D
// =========================
const card = document.getElementById("card");

let isDown = false;
let startX, startY;
let rotX = 0;
let rotY = 0;

card.addEventListener("mousedown",(e)=>{
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mouseup",()=> isDown=false);

document.addEventListener("mousemove",(e)=>{
    if(!isDown || isScrolling) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.clientX;
    startY = e.clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
});

/* TOUCH */
document.addEventListener("touchstart",(e)=>{
    isDown = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend",()=> isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown || isScrolling) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
}, { passive:true });

</script>

</body>
</html>
