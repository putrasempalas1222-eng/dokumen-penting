<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Frame Viewer FIX</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.15), transparent 40%),
        linear-gradient(135deg,#ffffff,#f3f6fb);
}

/* SCENE */
.scene{
    width:100%;
    max-width:420px;
    height:100dvh;

    display:flex;
    justify-content:center;
    align-items:center;

    perspective:2000px;
    padding:12px;
}

/* CARD */
.card{
    width:100%;
    max-width:380px;
    height:85dvh;
    max-height:700px;

    position:relative;
    transform-style:preserve-3d;
    cursor:grab;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:transform 0.2s ease;
}

/* DEPTH */
.card::before{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:28px;

    background:linear-gradient(
        145deg,
        rgba(255,255,255,0.9),
        rgba(200,200,200,0.3)
    );

    transform:translateZ(-20px);
    filter:blur(2px);
}

/* SHADOW */
.card::after{
    content:"";
    position:absolute;
    bottom:-40px;
    left:20%;
    width:60%;
    height:30px;
    background:rgba(0,0,0,0.25);
    filter:blur(25px);
}

/* FRAME */
.frame{
    position:absolute;
    inset:0;
    border-radius:24px;
    padding:5px;

    background:
        linear-gradient(145deg,#ffffff,#dcdcdc);

    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.9),
        inset 0 -3px 10px rgba(0,0,0,0.15),
        0 15px 40px rgba(0,0,0,0.2);
}

/* INNER */
.inner{
    width:100%;
    height:100%;
    border-radius:16px;
    overflow:hidden;

    background:#fff;
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.1);
}

/* CONTENT */
#pdf-container{
    width:100%;
    height:100%;
    padding:8px;
}

/* PDF MODE */
.pdf-mode{
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
}

/* IMAGE MODE */
.image-mode{
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCROLL */
.pdf-mode::-webkit-scrollbar{
    width:6px;
}
.pdf-mode::-webkit-scrollbar-thumb{
    background:linear-gradient(#4facfe,#00f2fe);
    border-radius:10px;
}

/* PDF */
canvas{
    width:100%;
    margin-bottom:12px;
    border-radius:12px;
}

/* IMAGE */
img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:12px;
}

/* RESPONSIVE EXTRA */
@media (max-width:480px){
    .card{
        height:80dvh;
    }
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="frame">
            <div class="inner">
                <div id="pdf-container"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// PARAM
const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("link");

if(!fileUrl){
    alert("Link tidak ditemukan!");
}

const apiUrl = "/api/pdf?link=" + encodeURIComponent(fileUrl);
const container = document.getElementById("pdf-container");

// LOAD FILE
async function loadFile(){
    const res = await fetch(apiUrl);
    const blob = await res.blob();
    const type = blob.type;

    if(type.includes("pdf")){
        container.classList.add("pdf-mode");
        loadPDF(blob);
    }
    else if(type.startsWith("image")){
        container.classList.add("image-mode");
        showImage(blob);
    }
}

// PDF
async function loadPDF(blob){
    const buffer = await blob.arrayBuffer();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for(let i=1;i<=pdf.numPages;i++){
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale:1.2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;
    }
}

// IMAGE
function showImage(blob){
    container.innerHTML = "";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(blob);

    container.appendChild(img);
}

// ROTATE 3D
const card = document.getElementById("card");

let isDown=false,startX,startY,rotX=0,rotY=0;

function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
}

card.addEventListener("mousedown",(e)=>{
    isDown=true;
    startX=e.clientX;
    startY=e.clientY;
});

document.addEventListener("mouseup",()=>isDown=false);

document.addEventListener("mousemove",(e)=>{
    if(!isDown) return;

    const dx=e.clientX-startX;
    const dy=e.clientY-startY;

    rotY+=dx*0.3;
    rotX-=dy*0.3;

    rotX = clamp(rotX,-25,25);
    rotY = clamp(rotY,-40,40);

    startX=e.clientX;
    startY=e.clientY;

    card.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;
});

// TOUCH
document.addEventListener("touchstart",(e)=>{
    isDown=true;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
});

document.addEventListener("touchend",()=>isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown) return;

    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;

    rotY+=dx*0.3;
    rotX-=dy*0.3;

    rotX = clamp(rotX,-25,25);
    rotY = clamp(rotY,-40,40);

    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;

    card.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;
});

// START
loadFile();
</script>

</body>
</html>
