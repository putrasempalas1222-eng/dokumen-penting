<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 3D PRO</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* BACKGROUND LEBIH HIDUP */
    background:
        radial-gradient(circle at 30% 30%, #0ff2, transparent 40%),
        radial-gradient(circle at 70% 70%, #00f2, transparent 40%),
        linear-gradient(135deg,#020617,#000);

    overflow:hidden;
    font-family:sans-serif;
}

/* SCENE */
.scene{
    width:100%;
    max-width:420px;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1800px;
}

/* CARD */
.card{
    width:95%;
    height:90vh;
    position:relative;
    border-radius:20px;
    transform-style:preserve-3d;
    cursor:grab;
}

/* GLASS + EDGE LIGHT */
.face{
    width:100%;
    height:100%;
    border-radius:20px;
    overflow:hidden;

    background:rgba(10,20,40,0.6);
    backdrop-filter:blur(12px);

    border:1px solid rgba(0,255,255,0.3);

    /* GLOW */
    box-shadow:
        0 0 25px rgba(0,255,255,0.2),
        inset 0 0 20px rgba(255,255,255,0.05);
}

/* EDGE GLOW ANIMASI */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:22px;
    background:linear-gradient(120deg, transparent, #0ff, transparent);
    opacity:.2;
    filter:blur(10px);
}

/* SCROLL */
#pdf-container{
    width:100%;
    height:100%;
    overflow-y:auto;
    padding:12px;
    scroll-behavior:smooth;
}

/* SCROLLBAR */
#pdf-container::-webkit-scrollbar{
    width:6px;
}
#pdf-container::-webkit-scrollbar-thumb{
    background:linear-gradient(#0ff,#00f);
    border-radius:10px;
}

/* CANVAS */
canvas{
    width:100%;
    margin-bottom:14px;
    border-radius:12px;
    background:#111;

    box-shadow:
        0 8px 20px rgba(0,0,0,0.6),
        0 0 10px rgba(0,255,255,0.15);
}

/* SHADOW REALISTIS */
.shadow{
    position:absolute;
    bottom:-40px;
    width:65%;
    height:35px;
    left:17%;
    background:black;
    filter:blur(30px);
    opacity:.5;
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="face">
            <div id="pdf-container"></div>
        </div>

        <div class="shadow" id="shadow"></div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

/* =========================
   🔥 PDF (LAZY)
========================= */
const url = "/api/pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function loadPDF(){
    const res = await fetch(url);
    const blob = await res.blob();
    const buffer = await blob.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    const container = document.getElementById("pdf-container");

    async function renderPage(num){
        if(num > pdf.numPages) return;

        const page = await pdf.getPage(num);
        const viewport = page.getViewport({ scale:1 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;

        setTimeout(()=>renderPage(num+1),80);
    }

    renderPage(1);
}

loadPDF();

/* =========================
   🎯 DRAG 360° ROTATION
========================= */
const card = document.getElementById("card");
const shadow = document.getElementById("shadow");

let isDown = false;
let startX, startY;
let rotX = 0;
let rotY = 0;

/* MOUSE */
card.addEventListener("mousedown",(e)=>{
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;
    card.style.cursor = "grabbing";
});

document.addEventListener("mouseup",()=>{
    isDown = false;
    card.style.cursor = "grab";
});

document.addEventListener("mousemove",(e)=>{
    if(!isDown) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.clientX;
    startY = e.clientY;

    updateTransform();
});

/* TOUCH */
document.addEventListener("touchstart",(e)=>{
    isDown = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend",()=> isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    updateTransform();
});

/* UPDATE */
function updateTransform(){
    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;

    shadow.style.transform = `scale(${1 + Math.abs(rotY)/40})`;
}

</script>

</body>
</html>
