<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer 3D 1 Halaman</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.15), transparent 40%),
        linear-gradient(135deg,#ffffff,#f3f6fb);
}

/* SCENE */
.scene{
    width:100%;
    max-width:420px;
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:2000px;
}

/* CARD */
.card{
    width:95%;
    height:100%;
    position:relative;
    border-radius:24px;
    transform-style:preserve-3d;
    cursor:grab;
}

/* FACE */
.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:24px;
    overflow:hidden;
    backface-visibility:hidden;
}

/* FRONT */
.front{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* BACK */
.back{
    transform: rotateY(180deg);
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(25px);
}

/* CONTAINER */
#pdf-container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PDF */
canvas{
    width:100%;
    height:auto;
    border-radius:14px;
}

/* IMAGE */
img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:14px;
}

/* NAV */
.nav{
    margin-top:10px;
}

button{
    padding:8px 14px;
    margin:0 5px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

/* SHADOW */
.shadow{
    position:absolute;
    bottom:-40px;
    width:60%;
    height:30px;
    left:20%;
    background:rgba(0,0,0,0.2);
    filter:blur(25px);
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="face front">
            <div id="pdf-container"></div>
        </div>

        <div class="face back"></div>

        <div class="shadow"></div>

    </div>
</div>

<div class="nav">
    <button onclick="prevPage()">◀ Prev</button>
    <button onclick="nextPage()">Next ▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

// =========================
// PARAM LINK
// =========================
const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("link");

if(!fileUrl){
    alert("Link tidak ditemukan!");
}

// API
const apiUrl = "/api/pdf?link=" + encodeURIComponent(fileUrl);

const container = document.getElementById("pdf-container");

let pdfDoc = null;
let currentPage = 1;
let isImage = false;

// =========================
// LOAD FILE
// =========================
async function loadFile(){

    const res = await fetch(apiUrl);
    const blob = await res.blob();
    const type = blob.type;

    if(type.includes("pdf")){
        isImage = false;
        loadPDF(blob);
    }
    else if(type.startsWith("image")){
        isImage = true;
        showImage(blob);
    }
    else{
        container.innerHTML = "File tidak didukung";
    }
}

// =========================
// PDF
// =========================
async function loadPDF(blob){

    const buffer = await blob.arrayBuffer();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;

    renderPage(currentPage);
}

async function renderPage(num){

    container.innerHTML = "";

    const page = await pdfDoc.getPage(num);

    const viewport = page.getViewport({ scale:1.3 });

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    container.appendChild(canvas);

    await page.render({
        canvasContext: ctx,
        viewport: viewport
    }).promise;
}

// =========================
// IMAGE
// =========================
function showImage(blob){

    container.innerHTML = "";

    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;

    container.appendChild(img);
}

// =========================
// NAVIGATION
// =========================
function nextPage(){
    if(isImage) return;

    if(currentPage < pdfDoc.numPages){
        currentPage++;
        renderPage(currentPage);
    }
}

function prevPage(){
    if(isImage) return;

    if(currentPage > 1){
        currentPage--;
        renderPage(currentPage);
    }
}

// =========================
// ROTATE 3D
// =========================
const card = document.getElementById("card");

let isDown = false;
let startX, startY;
let rotX = 0;
let rotY = 0;

card.addEventListener("mousedown",(e)=>{
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mouseup",()=> isDown=false);

document.addEventListener("mousemove",(e)=>{
    if(!isDown) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.clientX;
    startY = e.clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
});

/* TOUCH */
document.addEventListener("touchstart",(e)=>{
    isDown = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend",()=> isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
}, { passive:true });

// =========================
// START
// =========================
loadFile();

</script>

</body>
</html>
