<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- 🔥 FIX ANDROID VIEWPORT -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>3D Frame Viewer PRO</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body{
    height:100%;
}

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.12), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.12), transparent 40%),
        linear-gradient(135deg,#ffffff,#f3f6fb);
}

/* 🔥 SCENE FIX MOBILE */
.scene{
    width:100%;
    max-width:420px;
    height:100dvh; /* 🔥 fix android */
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1800px;
}

/* CARD */
.card{
    width:95%;
    height:92%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .1s linear;
}

/* FRAME */
.frame{
    position:absolute;
    inset:0;
    border-radius:22px;
    padding:10px;

    background:linear-gradient(145deg,#ffffff,#dcdcdc);

    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.9),
        inset 0 -3px 10px rgba(0,0,0,0.15),
        0 10px 30px rgba(0,0,0,0.15);
}

/* INNER */
.inner{
    width:100%;
    height:100%;
    border-radius:16px;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#fff;
}

/* CONTAINER */
#pdf-container{
    width:100%;
    height:100%;
}

/* PDF MODE */
.pdf-mode{
    overflow-y:auto;
    padding:10px;
    -webkit-overflow-scrolling:touch; /* 🔥 smooth android */
}

/* IMAGE MODE */
.image-mode{
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PDF */
canvas{
    width:100%;
    margin-bottom:10px;
    border-radius:10px;
}

/* IMAGE PERFECT CENTER */
img{
    max-width:100%;
    max-height:100%;

    width:auto;
    height:auto;

    object-fit:contain;

    display:block;
}

/* SHADOW */
.card::after{
    content:"";
    position:absolute;
    bottom:-40px;
    left:20%;
    width:60%;
    height:25px;
    background:rgba(0,0,0,0.2);
    filter:blur(20px);
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">
        <div class="frame">
            <div class="inner">
                <div id="pdf-container"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

// PARAM
const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("link");

if(!fileUrl){
    alert("Link tidak ditemukan!");
}

const apiUrl = "/api/pdf?link=" + encodeURIComponent(fileUrl);
const container = document.getElementById("pdf-container");

// LOAD FILE
async function loadFile(){

    const res = await fetch(apiUrl);
    const blob = await res.blob();
    const type = blob.type;

    if(type.includes("pdf")){
        container.className = "pdf-mode";
        loadPDF(blob);
    }
    else if(type.startsWith("image")){
        container.className = "image-mode";
        showImage(blob);
    }
}

// PDF
async function loadPDF(blob){

    const buffer = await blob.arrayBuffer();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for(let i=1;i<=pdf.numPages;i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale:1.2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;
    }
}

// IMAGE
function showImage(blob){

    container.innerHTML = "";

    const img = document.createElement("img");
    img.src = URL.createObjectURL(blob);

    container.appendChild(img);
}

// 🔥 ROTATE (SMOOTH + MOBILE)
const card = document.getElementById("card");

let isDown=false,startX,startY,rotX=0,rotY=0;

function start(e){
    isDown=true;
    startX=e.clientX || e.touches[0].clientX;
    startY=e.clientY || e.touches[0].clientY;
}

function move(e){
    if(!isDown) return;

    const x = e.clientX || e.touches[0].clientX;
    const y = e.clientY || e.touches[0].clientY;

    const dx=x-startX;
    const dy=y-startY;

    rotY+=dx*0.3;
    rotX-=dy*0.3;

    startX=x;
    startY=y;

    card.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}

function end(){
    isDown=false;
}

card.addEventListener("mousedown",start);
document.addEventListener("mousemove",move);
document.addEventListener("mouseup",end);

document.addEventListener("touchstart",start,{passive:true});
document.addEventListener("touchmove",move,{passive:true});
document.addEventListener("touchend",end);

// START
loadFile();

</script>

</body>
</html>
