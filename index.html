<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 3D Smooth Mobile</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#000);
    overflow:hidden;
    font-family:sans-serif;
}

/* RESPONSIVE WRAPPER */
.scene{
    width:100%;
    max-width:420px;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1500px;
}

/* CARD */
.card{
    width:95%;
    height:90vh;
    position:relative;
    border-radius:18px;
    transform-style:preserve-3d;
    transition:transform 0.2s ease;
}

/* GLASS UI */
.face{
    width:100%;
    height:100%;
    border-radius:18px;
    overflow:hidden;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}

/* SCROLL CONTAINER */
#pdf-container{
    width:100%;
    height:100%;
    overflow-y:auto;
    padding:10px;

    /* smooth scroll */
    scroll-behavior:smooth;

    /* custom scrollbar */
    scrollbar-width:thin;
}

/* scrollbar chrome */
#pdf-container::-webkit-scrollbar{
    width:6px;
}
#pdf-container::-webkit-scrollbar-thumb{
    background:rgba(0,255,255,0.4);
    border-radius:10px;
}

/* canvas */
canvas{
    width:100%;
    margin-bottom:12px;
    border-radius:10px;
    background:#111;
}

/* floating shadow */
.shadow{
    position:absolute;
    bottom:-30px;
    width:60%;
    height:30px;
    left:20%;
    background:black;
    filter:blur(25px);
    opacity:.4;
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="face">
            <div id="pdf-container"></div>
        </div>

        <div class="shadow" id="shadow"></div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

/* =========================
   🔥 CONFIG
========================= */
const url = "/api/pdf"; // tetap pakai API kamu

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   🚀 LOAD PDF (LAZY RENDER)
========================= */
async function loadPDF(){

    const res = await fetch(url);
    const blob = await res.blob();
    const buffer = await blob.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    const container = document.getElementById("pdf-container");

    let currentPage = 1;

    async function renderPage(num){
        if(num > pdf.numPages) return;

        const page = await pdf.getPage(num);

        /* scale kecil biar ringan */
        const viewport = page.getViewport({ scale:1 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;

        /* render berikutnya bertahap */
        setTimeout(()=>{
            renderPage(num + 1);
        },100);
    }

    renderPage(currentPage);
}

loadPDF();

/* =========================
   🎯 3D INTERACTION (RINGAN)
========================= */
const card = document.getElementById("card");
const shadow = document.getElementById("shadow");

let rotX = 0;
let rotY = 0;

card.addEventListener("mousemove",(e)=>{
    const rect = card.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const midX = rect.width / 2;
    const midY = rect.height / 2;

    rotY = (x - midX) / 20;
    rotX = -(y - midY) / 20;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;

    shadow.style.transform = `scale(${1 + Math.abs(rotY)/50})`;
});

/* TOUCH SUPPORT */
card.addEventListener("touchmove",(e)=>{
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();

    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;

    rotY = (x - rect.width/2)/25;
    rotX = -(y - rect.height/2)/25;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
});

</script>

</body>
</html>
