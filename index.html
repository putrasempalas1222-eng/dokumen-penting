<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D PDF SCROLL + ZOOM</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#020617,#000);
    overflow:hidden;
}

.scene{
    perspective:2500px;
}

.card{
    width:360px;
    height:520px;
    position:relative;
    transform-style:preserve-3d;
    border-radius:20px;
    cursor:grab;
}

/* wrapper zoom */
#zoom-wrapper{
    width:100%;
    height:100%;
    transform-origin:center;
}

/* scroll container */
#pdf-container{
    width:100%;
    height:100%;
    overflow:auto;
    padding:10px;
}

/* halaman */
#pdf-container canvas{
    width:100%;
    margin-bottom:12px;
    border-radius:10px;
}

/* glow */
.card::before{
    content:"";
    position:absolute;
    inset:-50px;
    background:radial-gradient(circle,rgba(0,255,255,.25),transparent);
    filter:blur(60px);
    z-index:-1;
}

/* shadow */
.shadow{
    position:absolute;
    bottom:-70px;
    width:60%;
    height:40px;
    left:20%;
    background:black;
    filter:blur(40px);
    opacity:.5;
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div id="zoom-wrapper">
            <div id="pdf-container"></div>
        </div>

        <div class="shadow" id="shadow"></div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

/* =========================
   URL API VERCEL
========================= */
const url = "/api/pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* =========================
   LOAD PDF MULTI PAGE
========================= */
async function loadPDF(){
    try{
        const res = await fetch(url);
        const blob = await res.blob();
        const buffer = await blob.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

        const container = document.getElementById("pdf-container");

        for(let i=1;i<=pdf.numPages;i++){
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale:1.5 });

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            container.appendChild(canvas);

            await page.render({
                canvasContext: ctx,
                viewport
            }).promise;
        }

    }catch(e){
        console.error(e);
        alert("PDF gagal dimuat!");
    }
}
loadPDF();

/* =========================
   ZOOM CONTROL
========================= */
const zoomWrapper = document.getElementById("zoom-wrapper");
let scale = 1;

/* mouse zoom */
document.getElementById("pdf-container").addEventListener("wheel", (e)=>{
    if(e.ctrlKey){ // ctrl + scroll
        e.preventDefault();

        scale += e.deltaY * -0.001;
        scale = Math.min(Math.max(0.5, scale), 3);

        zoomWrapper.style.transform = `scale(${scale})`;
    }
}, { passive:false });

/* pinch zoom (mobile) */
let startDist = 0;

document.addEventListener("touchmove", (e)=>{
    if(e.touches.length === 2){
        e.preventDefault();

        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;

        const dist = Math.sqrt(dx*dx + dy*dy);

        if(startDist === 0){
            startDist = dist;
        }

        let diff = dist - startDist;
        scale += diff * 0.005;

        scale = Math.min(Math.max(0.5, scale), 3);

        zoomWrapper.style.transform = `scale(${scale})`;

        startDist = dist;
    }
});

document.addEventListener("touchend", ()=>{
    startDist = 0;
});

/* =========================
   DRAG 3D ROTATE
========================= */
const card = document.getElementById("card");
const shadow = document.getElementById("shadow");

let isDown = false;
let startX = 0;
let startY = 0;

let rotX = 0;
let rotY = 0;
let t = 0;

card.addEventListener("mousedown",(e)=>{
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;
    card.style.cursor = "grabbing";
});

document.addEventListener("mouseup",()=>{
    isDown = false;
    card.style.cursor = "grab";
});

document.addEventListener("mousemove",(e)=>{
    if(!isDown) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    rotY += dx * 0.3;
    rotX -= dy * 0.3;

    startX = e.clientX;
    startY = e.clientY;
});

/* touch rotate */
document.addEventListener("touchstart",(e)=>{
    if(e.touches.length === 1){
        isDown = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }
});

document.addEventListener("touchend",()=> isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown || e.touches.length !== 1) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    rotY += dx * 0.3;
    rotX -= dy * 0.3;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

/* =========================
   FLOAT ANIMATION
========================= */
function animate(){
    t += 0.02;

    const floatY = Math.sin(t) * 15;

    card.style.transform = `
        translateY(${floatY}px)
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;

    shadow.style.transform = `scale(${1 + Math.abs(rotY)/40})`;

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
