<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer 3D Multi File</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:sans-serif;

    background:
        radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,200,0.15), transparent 40%),
        linear-gradient(135deg,#ffffff,#f3f6fb);
}

/* SCENE */
.scene{
    width:100%;
    max-width:420px;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:2000px;
}

/* CARD */
.card{
    width:95%;
    height:100%;
    position:relative;
    border-radius:24px;
    transform-style:preserve-3d;
    cursor:grab;
}

/* FACE */
.face{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:24px;
    overflow:hidden;
    backface-visibility:hidden;
}

/* FRONT */
.front{
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* BACK */
.back{
    transform: rotateY(180deg);
    background:rgba(255,255,255,0.4);
    backdrop-filter:blur(25px);
}

/* CONTAINER */
#pdf-container{
    width:100%;
    height:100%;
    padding:14px;
}

/* PDF MODE */
.pdf-mode{
    overflow-y:auto;
}

/* IMAGE MODE */
.image-mode{
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SCROLLBAR */
.pdf-mode::-webkit-scrollbar{
    width:6px;
}
.pdf-mode::-webkit-scrollbar-thumb{
    background:linear-gradient(#4facfe,#00f2fe);
    border-radius:10px;
}

/* PDF */
canvas{
    width:100%;
    margin-bottom:14px;
    border-radius:14px;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* IMAGE FULL */
img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:14px;
}

/* SHADOW */
.shadow{
    position:absolute;
    bottom:-40px;
    width:60%;
    height:30px;
    left:20%;
    background:rgba(0,0,0,0.2);
    filter:blur(25px);
}
</style>
</head>

<body>

<div class="scene">
    <div class="card" id="card">

        <div class="face front">
            <div id="pdf-container"></div>
        </div>

        <div class="face back"></div>

        <div class="shadow"></div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

// =========================
// PARAM LINK
// =========================
const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("link");

if(!fileUrl){
    alert("Link tidak ditemukan!");
}

// API
const apiUrl = "/api/pdf?link=" + encodeURIComponent(fileUrl);

const container = document.getElementById("pdf-container");

// =========================
// LOAD FILE
// =========================
async function loadFile(){

    const res = await fetch(apiUrl);
    const blob = await res.blob();
    const type = blob.type;

    if(type.includes("pdf")){
        container.classList.remove("image-mode");
        container.classList.add("pdf-mode");

        loadPDF(blob);
    }
    else if(type.startsWith("image")){
        container.classList.remove("pdf-mode");
        container.classList.add("image-mode");

        showImage(blob);
    }
    else{
        container.innerHTML = "File tidak didukung";
    }
}

// =========================
// PDF (SCROLL)
// =========================
async function loadPDF(blob){

    const buffer = await blob.arrayBuffer();

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

    for(let i = 1; i <= pdf.numPages; i++){

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale:1.2 });

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        container.appendChild(canvas);

        await page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise;
    }
}

// =========================
// IMAGE (FULL NO SCROLL)
// =========================
function showImage(blob){

    container.innerHTML = "";

    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;

    container.appendChild(img);
}

// =========================
// SCROLL DETECTOR
// =========================
let isScrolling = false;

container.addEventListener("touchstart", () => {
    isScrolling = true;
}, { passive: true });

container.addEventListener("touchend", () => {
    setTimeout(() => isScrolling = false, 100);
});

container.addEventListener("scroll", () => {
    isScrolling = true;
    clearTimeout(container._scrollTimer);
    container._scrollTimer = setTimeout(() => {
        isScrolling = false;
    }, 120);
});

// =========================
// ROTATE 3D
// =========================
const card = document.getElementById("card");

let isDown = false;
let startX, startY;
let rotX = 0;
let rotY = 0;

card.addEventListener("mousedown",(e)=>{
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mouseup",()=> isDown=false);

document.addEventListener("mousemove",(e)=>{
    if(!isDown || isScrolling) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.clientX;
    startY = e.clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
});

/* TOUCH */
document.addEventListener("touchstart",(e)=>{
    isDown = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend",()=> isDown=false);

document.addEventListener("touchmove",(e)=>{
    if(!isDown || isScrolling) return;

    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    rotY += dx * 0.4;
    rotX -= dy * 0.4;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    card.style.transform = `
        rotateX(${rotX}deg)
        rotateY(${rotY}deg)
    `;
}, { passive:true });

// =========================
// START
// =========================
loadFile();

</script>

</body>
</html>
